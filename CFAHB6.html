<!DOCTYPE html>
<html>
  <head>
    <title>6 Dance! ^^ 6 Dance! :) </title>
  </head>
  <body>
    <img id="follower" src="lololol.png" alt="follower" style="position: fixed; width: 50px; pointer-events: none;">

    <script> const image = document.getElementById('follower');

document.addEventListener('mousemove', (e) => {
    // Use clientX and clientY for coordinates relative to the viewport
    const x = e.clientX;
    const y = e.clientY;

    // Update the image position
    // Subtract half the image size (e.g., 25px) to center it on the cursor
    image.style.left = `${x - 25}px`;
    image.style.top = `${y - 25}px`;
});
</script>

    <div class="container">
  <p class="bottom-right-text">psw --spiritomb.</p>
</div>

    <style>

      .container {
  position: relative; /* Acts as the anchor for the child */
  width: 100%;
  height: 300px;
  border: 1px solid black;
}

.bottom-right-text {
  position: absolute;
  bottom: 0; /* Sticks to the bottom edge */
  right: 0;  /* Sticks to the right edge */
  margin: 0; /* Optional: removes default paragraph spacing */
}

    </style>


  </body>
</html>
